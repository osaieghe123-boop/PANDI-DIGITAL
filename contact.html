<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Pandi Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-5 rounded-4 shadow-sm">
            <h2 class="text-center mb-4" style="color: var(--pandi-purple);">Start Your Transformation</h2>
            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control rounded-pill" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Service Required</label>
                    <select name="service" class="form-select rounded-pill">
                        <option>Agricpreneurism Tech</option>
                        <option>Web/App Development (₦950k)</option>
                        <option>Media Event Coverage</option>
                        <option>CRM Automation (₦300k)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Event Date / Project Details</label>
                    <textarea name="details" class="form-control rounded-3" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label">WhatsApp Number</label>
                    <input type="tel" name="phone" class="form-control rounded-pill" placeholder="+234...">
                </div>
                <button type="submit" class="btn btn-pandi w-100 py-3">Submit & Request Booking</button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-muted">Or Reach us directly:</p>
                <a href="https://wa.me/2349153538791" class="text-decoration-none fw-bold" style="color: var(--pandi-purple);">+234 915 353 8791</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
